services:
  - type: web
    name: securedesk-api
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URL_PATTERNS
        sync: false
      - key: SUPER_ADMIN_NAME
        value: Super Admin
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PHONE
        value: 9999999999
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SIGNUP_COUPON
        sync: false
      - key: SUPER_ADMIN_SIGNUP_COUPON
        sync: false
